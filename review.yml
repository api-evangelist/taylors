    rating: 3
    summary: >-
      No formal/branded developer portal, SDKs, public sign-up, or status page,
      but four real machine interfaces were verified live: the Koha library
      catalog exposes a REST API (/api/v1 OpenAPI spec retrievable) and an
      OAI-PMH 2.0 provider (Identify -> "Taylor's Library"); the DSpace CRIS
      e-Repository exposes a HAL+JSON REST API (/server/api -> cris-2022.01.01)
      and an OAI-PMH 2.0 provider (Identify -> "Taylor's University Library",
      OpenAIRE CERIF). GitHub org exists but has no public repos. Student portals
      (Taylor's Online, TOPAS, Campus Central) are authenticated apps, not
      documented public APIs. No endpoints were fabricated; only observed URLs
      are recorded below.
    endpoints:
      - url: https://librarycatalogue.taylors.edu.my/api/v1/
        status: 200
        note: Koha REST API OpenAPI/Swagger spec publicly retrievable.
      - url: https://librarycatalogue.taylors.edu.my/cgi-bin/koha/oai.pl?verb=Identify
        status: 200
        note: Koha OAI-PMH 2.0 Identify returns "Taylor's Library".
      - url: https://librarycatalogue.taylors.edu.my/
